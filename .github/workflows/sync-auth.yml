name: Sync Auth Config

on:
  push:
    branches: [main]
    paths:
      - 'config/auth.json'
      - '.github/workflows/sync-auth.yml'
  workflow_dispatch:

concurrency:
  group: sync-auth
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --filter @rack/registry-worker

      - name: Upload auth.json to R2
        working-directory: apps/registry-worker
        run: pnpm exec wrangler r2 object put rack-registry/.auth/auth.json --file ../../config/auth.json --content-type application/json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Read an anonymous-read namespace — confirms the Worker can still parse
      # auth.json after the sync. A broken auth.json would surface as 500 here.
      - name: Post-sync read check
        run: curl --fail --silent --show-error --retry 5 --retry-delay 3 --retry-connrefused https://registry.rackjs.com/registries/@rack/runtimes/node/versions
